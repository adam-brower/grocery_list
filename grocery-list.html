<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Grocery">
<title>Grocery List</title>
<style>
:root{--g:#00674b;--gd:#004d38;--gl:#e8f5f0;--bg:#f5f5f7;--card:#fff;--txt:#1d1d1f;--txt2:#6e6e73;--border:#e5e5e7;--red:#ff3b30}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;background:var(--bg);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative}
/* Header */
.hdr{background:var(--g);color:#fff;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hdr-title{font-size:1.15rem;font-weight:700;flex:1;letter-spacing:-.01em}
.hdr-sub{font-size:.75rem;opacity:.8;font-weight:400}
.hdr-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:10px;padding:7px 13px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s;font-family:inherit}
.hdr-btn:active{opacity:.7}
.hdr-icon-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:10px;width:36px;height:36px;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .15s;flex-shrink:0}
.hdr-icon-btn:active{opacity:.7}
/* Main */
#main{flex:1;overflow-y:auto;padding-bottom:calc(72px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch}
/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:20}
.bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0;border:none;background:none;cursor:pointer;color:var(--txt2);font-size:.63rem;font-weight:500;transition:color .15s;position:relative;font-family:inherit}
.bnav-tab.active{color:var(--g)}
.bnav-tab svg{width:22px;height:22px}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:.6rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
/* Section card */
.section{background:var(--card);border-radius:16px;margin:10px 12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.section-hdr{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:#fafafa}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.section-title{font-size:.8rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;flex:1}
.section-count{font-size:.78rem;color:var(--txt2)}
.section-total{font-size:.85rem;color:var(--g);font-weight:700}
/* List item */
.list-item{display:flex;align-items:center;padding:11px 14px;gap:11px;border-bottom:1px solid var(--border);transition:background .1s;min-height:52px}
.list-item:last-child{border-bottom:none}
.list-item:active{background:#f5f5f7}
.list-item.done{opacity:.4}
.list-item.done .item-name{text-decoration:line-through}
input[type=checkbox]{width:22px;height:22px;border-radius:50%;accent-color:var(--g);cursor:pointer;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:.97rem;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:.78rem;color:var(--txt2);margin-top:1px}
.item-source{font-size:.72rem;color:var(--g);background:var(--gl);border-radius:6px;padding:1px 6px;display:inline-block;margin-top:2px}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.item-price{font-size:.88rem;color:var(--g);font-weight:600}
.item-del{background:none;border:none;color:#c7c7cc;font-size:1rem;cursor:pointer;padding:5px;line-height:1;border-radius:8px;transition:color .15s;display:flex;align-items:center;justify-content:center}
.item-del:active{color:var(--red)}
/* Summary bar */
.summary-bar{margin:10px 12px 0;background:var(--card);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.total-col{display:flex;flex-direction:column;gap:1px}
.total-label{font-size:.75rem;color:var(--txt2);font-weight:500}
.total-amount{font-size:1.4rem;font-weight:700;color:var(--g);letter-spacing:-.02em}
.total-note{font-size:.68rem;color:var(--txt2)}
.summary-actions{display:flex;gap:8px;margin-left:auto;flex-shrink:0}
/* Action bar */
.action-row{display:flex;justify-content:space-between;align-items:center;padding:6px 16px}
.link-btn{background:none;border:none;color:var(--g);font-size:.82rem;font-weight:600;cursor:pointer;padding:6px 0;font-family:inherit}
.link-btn.red{color:var(--red)}
/* Empty state */
.empty{text-align:center;padding:60px 32px 40px;color:var(--txt2)}
.empty-icon{width:56px;height:56px;border-radius:16px;background:var(--gl);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-title{font-size:1.1rem;font-weight:600;color:var(--txt);margin-bottom:8px}
.empty-sub{font-size:.88rem;line-height:1.5}
/* Meal cards */
.meal-card{background:var(--card);border-radius:16px;margin:8px 12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.meal-name{font-size:1rem;font-weight:700;color:var(--txt);margin-bottom:4px}
.meal-desc{font-size:.83rem;color:var(--txt2);line-height:1.45;margin-bottom:8px}
.meal-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.pill{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border-radius:20px;padding:3px 9px;font-size:.73rem;color:var(--txt2);font-weight:500}
.meal-actions{display:flex;gap:8px}
/* Buttons */
.btn{border:none;cursor:pointer;border-radius:12px;font-weight:600;font-size:.88rem;padding:9px 16px;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit}
.btn:active{opacity:.8;transform:scale(.97)}
.btn-primary{background:var(--g);color:#fff}
.btn-secondary{background:var(--gl);color:var(--g)}
.btn-ghost{background:var(--bg);color:var(--txt)}
.btn-danger{background:#fff1f0;color:var(--red)}
.btn-sm{padding:7px 13px;font-size:.8rem;border-radius:10px}
/* FAB */
.fab{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));right:calc(50% - 224px);width:50px;height:50px;background:var(--g);color:#fff;border:none;border-radius:50%;font-size:1.6rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,103,75,.4);cursor:pointer;transition:transform .15s;z-index:15;line-height:1}
.fab:active{transform:scale(.9)}
@media(max-width:480px){.fab{right:16px}}
/* Search */
.search-wrap{padding:10px 12px 0}
.search-box{display:flex;align-items:center;background:var(--card);border-radius:12px;border:1px solid var(--border);padding:0 12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.search-icon{flex-shrink:0;color:var(--txt2)}
.search{flex:1;border:none;padding:10px 8px;font-size:.95rem;color:var(--txt);background:none;outline:none;font-family:inherit}
.search::placeholder{color:var(--txt2)}
.search-clear{background:none;border:none;color:var(--txt2);font-size:1rem;cursor:pointer;padding:4px;line-height:1;font-family:inherit}
/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;display:flex;align-items:flex-end;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fadeBg .2s ease-out}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.modal-hdr{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:1.05rem;font-weight:700;flex:1}
.modal-sub{font-size:.8rem;color:var(--txt2)}
.modal-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.modal-footer{padding:14px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);display:flex;gap:10px}
/* Pre-check item */
.check-item{display:flex;align-items:center;padding:11px 16px;gap:12px;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-item.unchecked{opacity:.45}
.check-info{flex:1}
.check-name{font-size:.95rem;font-weight:500}
.check-qty{font-size:.8rem;color:var(--txt2);margin-top:1px}
.check-price{font-size:.85rem;color:var(--g);font-weight:600}
/* Form overlay */
.form-overlay{position:fixed;inset:0;background:var(--bg);z-index:25;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideInRight .25s cubic-bezier(.25,.46,.45,.94)}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.form-hdr{background:var(--g);color:#fff;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.form-hdr-title{font-size:1.1rem;font-weight:700;flex:1}
.form-body{padding:16px;padding-bottom:calc(100px + env(safe-area-inset-bottom,0px))}
/* Form groups */
.field-group{background:var(--card);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.field-row{display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border)}
.field-row:last-child{border-bottom:none}
.field-label{font-size:.83rem;color:var(--txt2);width:88px;flex-shrink:0;padding:12px 0;font-weight:500}
.field-input{flex:1;border:none;padding:12px 0 12px 8px;font-size:.95rem;color:var(--txt);background:none;outline:none;font-family:inherit}
.field-textarea{width:100%;border:none;padding:12px 16px;font-size:.92rem;color:var(--txt);background:none;outline:none;resize:none;min-height:110px;font-family:inherit;line-height:1.55}
select.field-input{cursor:pointer;-webkit-appearance:none;appearance:none}
/* Ingredient grid */
.ingr-wrap{background:var(--card);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ingr-grid-hdr{display:grid;grid-template-columns:1fr 60px 80px 72px 60px 32px;gap:4px;padding:7px 12px;background:#fafafa;border-bottom:1px solid var(--border)}
.ingr-col-hdr{font-size:.68rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em}
.ingr-row{display:grid;grid-template-columns:1fr 60px 80px 72px 60px 32px;gap:4px;padding:7px 12px;border-bottom:1px solid var(--border);align-items:center}
.ingr-row:last-child{border-bottom:none}
.ingr-input{border:1px solid var(--border);border-radius:8px;padding:6px 7px;font-size:.82rem;color:var(--txt);background:var(--bg);font-family:inherit;width:100%;outline:none;transition:border-color .15s;min-width:0}
.ingr-input:focus{border-color:var(--g);background:#fff}
select.ingr-input{cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:3px}
.ingr-del{width:28px;height:28px;border:none;background:none;color:#c7c7cc;font-size:1rem;cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s}
.ingr-del:active{color:var(--red);background:#fff1f0}
.ingr-add-row{padding:10px 12px;border-top:1px solid var(--border);background:#fafafa}
/* Section label */
.sec-label{font-size:.78rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;padding:14px 4px 6px}
/* Toast */
#toast-wrap{position:fixed;top:calc(env(safe-area-inset-top,0px) + 60px);left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:#1d1d1f;color:#fff;padding:9px 18px;border-radius:20px;font-size:.87rem;font-weight:500;animation:toastIn .2s ease-out;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25)}
.toast.success{background:var(--g)}
.toast.error{background:var(--red)}
/* Misc */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr-mount"></div>
  <div id="main"></div>
  <nav class="bnav" id="bnav"></nav>
  <div id="fab-mount"></div>
  <div id="modal-mount"></div>
  <div id="form-mount"></div>
  <div id="toast-wrap"></div>
</div>
<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
// GITHUB SYNC
// Reads/writes data.json in the repo via GitHub API.
// Token is stored in localStorage only (never sent
// anywhere except api.github.com).
// ═══════════════════════════════════════════════

const GH = {
  cfg: {},          // { owner, repo, token, branch }
  sha: null,        // current SHA of data.json (required for PUT)
  status: 'idle',   // 'idle'|'loading'|'saving'|'synced'|'error'|'unconfigured'
  timer: null,
};

function ghLoadConfig() {
  try { GH.cfg = JSON.parse(localStorage.getItem('gl_ghcfg') || '{}'); } catch(e) { GH.cfg = {}; }
}

function ghSaveConfig() {
  localStorage.setItem('gl_ghcfg', JSON.stringify(GH.cfg));
}

function ghConfigured() {
  return !!(GH.cfg.owner && GH.cfg.repo && GH.cfg.token);
}

function ghSetStatus(s) {
  GH.status = s;
  const el = document.getElementById('sync-status');
  if (!el) return;
  const labels = { loading:'Loading...', saving:'Saving...', synced:'Synced', error:'Sync error', unconfigured:'Not synced', idle:'' };
  const colors = { loading:'#ff9800', saving:'#ff9800', synced:'#00674b', error:'#ff3b30', unconfigured:'#9e9e9e', idle:'#9e9e9e' };
  el.textContent = labels[s] || '';
  el.style.color = colors[s] || '#9e9e9e';
}

// UTF-8 safe base64 encode
function toB64(str) {
  const bytes = new TextEncoder().encode(str);
  return btoa(String.fromCharCode(...bytes));
}

async function ghLoad() {
  if (!ghConfigured()) { GH.status = 'unconfigured'; return false; }
  ghSetStatus('loading');
  try {
    const { owner, repo, branch = 'main' } = GH.cfg;
    const url = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/data.json?_=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (Array.isArray(data.meals)) S.meals = data.meals;
    if (Array.isArray(data.list))  S.list  = data.list;
    save(); // mirror to localStorage
    ghSetStatus('synced');
    return true;
  } catch(e) {
    console.warn('GitHub load failed:', e.message);
    ghSetStatus('error');
    return false;
  }
}

async function ghPush() {
  if (!ghConfigured()) return;
  ghSetStatus('saving');
  const { owner, repo, token, branch = 'main' } = GH.cfg;
  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/data.json`;
  try {
    // Fetch current SHA so GitHub accepts the update
    if (!GH.sha) {
      const getRes = await fetch(apiUrl, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (getRes.ok) { const d = await getRes.json(); GH.sha = d.sha; }
    }
    const payload = {
      version: 1,
      lastUpdated: new Date().toISOString(),
      meals: S.meals,
      list: S.list,
    };
    const body = {
      message: `Update grocery data — ${new Date().toLocaleDateString('en-US')}`,
      content: toB64(JSON.stringify(payload, null, 2)),
      branch,
      ...(GH.sha ? { sha: GH.sha } : {}),
    };
    const putRes = await fetch(apiUrl, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (!putRes.ok) {
      const err = await putRes.json().catch(()=>({}));
      // SHA conflict — refetch and retry once
      if (putRes.status === 409 || putRes.status === 422) {
        GH.sha = null; await ghPush(); return;
      }
      throw new Error(err.message || `HTTP ${putRes.status}`);
    }
    const result = await putRes.json();
    GH.sha = result.content?.sha || null;
    ghSetStatus('synced');
  } catch(e) {
    console.warn('GitHub push failed:', e.message);
    ghSetStatus('error');
    toast('Sync error — saved locally', 'error');
  }
}

// Debounced save — waits 1.5s after last change before pushing
function ghQueue() {
  clearTimeout(GH.timer);
  if (!ghConfigured()) return;
  GH.timer = setTimeout(ghPush, 1500);
}

// ═══════════════════════════════════════════════
// SETTINGS MODAL
// ═══════════════════════════════════════════════

function openSettings() {
  const c = GH.cfg;
  document.getElementById('modal-mount').innerHTML = `
    <div class="modal-overlay" onclick="overlayClose(event)">
      <div class="modal-sheet" onclick="event.stopPropagation()" style="max-height:90vh">
        <div class="modal-handle"></div>
        <div class="modal-hdr">
          <div class="modal-title">GitHub Sync</div>
          ${ghConfigured() ? `<span style="font-size:.78rem;color:var(--g);font-weight:600">${GH.status==='synced'?'Synced':'Connected'}</span>` : ''}
        </div>
        <div class="modal-body" style="padding:16px">
          <p style="font-size:.85rem;color:var(--txt2);line-height:1.55;margin-bottom:14px">
            Your meals and list are saved to <code style="background:var(--bg);padding:1px 5px;border-radius:4px;font-size:.82rem">data.json</code> in your GitHub repo.
            Every device that opens the page shares the same data.
          </p>
          <div class="field-group" style="margin-bottom:14px">
            <div class="field-row">
              <span class="field-label">Username</span>
              <input class="field-input" id="cfg-owner" type="text" placeholder="your-github-username" value="${esc(c.owner||'')}">
            </div>
            <div class="field-row">
              <span class="field-label">Repo</span>
              <input class="field-input" id="cfg-repo" type="text" placeholder="grocery-list" value="${esc(c.repo||'')}">
            </div>
            <div class="field-row">
              <span class="field-label">Branch</span>
              <input class="field-input" id="cfg-branch" type="text" placeholder="main" value="${esc(c.branch||'main')}">
            </div>
            <div class="field-row">
              <span class="field-label">Token</span>
              <input class="field-input" id="cfg-token" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${esc(c.token||'')}">
            </div>
          </div>
          <p style="font-size:.78rem;color:var(--txt2);line-height:1.5;margin-bottom:6px">
            Create a token at <strong>github.com/settings/tokens</strong> with <strong>repo</strong> scope (classic token).
            It is stored only in this browser's localStorage.
          </p>
        </div>
        <div class="modal-footer" style="flex-direction:column;gap:8px">
          <button class="btn btn-primary" style="width:100%" onclick="saveSettings()">Save &amp; Sync Now</button>
          ${ghConfigured() ? `<button class="btn btn-danger" style="width:100%" onclick="clearSettings()">Disconnect</button>` : ''}
          <button class="btn btn-ghost" style="width:100%" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>`;
}

async function saveSettings() {
  const owner  = document.getElementById('cfg-owner')?.value.trim();
  const repo   = document.getElementById('cfg-repo')?.value.trim();
  const branch = document.getElementById('cfg-branch')?.value.trim() || 'main';
  const token  = document.getElementById('cfg-token')?.value.trim();
  if (!owner || !repo || !token) { toast('Fill in all fields', 'error'); return; }
  GH.cfg = { owner, repo, branch, token };
  GH.sha = null;
  ghSaveConfig();
  closeModal();
  render();
  const ok = await ghLoad();
  if (ok) render(); // re-render with fresh data
  else { toast('Connected — pushing local data now...'); await ghPush(); }
}

function clearSettings() {
  if (!confirm('Disconnect GitHub sync? Your local data is kept.')) return;
  GH.cfg = {}; GH.sha = null; GH.status = 'unconfigured';
  localStorage.removeItem('gl_ghcfg');
  closeModal(); render();
  toast('GitHub sync disconnected');
}

const CATS = [
  { id:'produce',    label:'Produce',           color:'#4caf50' },
  { id:'dairy',      label:'Dairy & Eggs',       color:'#2196f3' },
  { id:'meat',       label:'Meat & Seafood',     color:'#f44336' },

// STORAGE

function save() {
  try {
    localStorage.setItem('gl_meals', JSON.stringify(S.meals));
    localStorage.setItem('gl_list',  JSON.stringify(S.list));
  } catch(e){}
  ghQueue(); // debounced push to data.json on GitHub
}

function load() {
  try {
    const m = localStorage.getItem('gl_meals');
    const l = localStorage.getItem('gl_list');
    S.meals = m ? JSON.parse(m) : JSON.parse(JSON.stringify(SAMPLE_MEALS));
    S.list  = l ? JSON.parse(l) : [];
  } catch(e) {
    S.meals = JSON.parse(JSON.stringify(SAMPLE_MEALS));
    S.list  = [];
  }
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════

function uid() {
  return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function fmtPrice(n) {
  if (!n || n <= 0) return '';
  return '$' + Number(n).toFixed(2);
}

function totalList(items) {
  return items.reduce((a,i) => a + (i.price||0), 0);
}

function catInfo(id) {
  return CAT_MAP[id] || CATS[CATS.length-1];
}

function toast(msg, type='') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2400);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderListView() {
  const hdr = document.getElementById('hdr-mount');
  const remaining = S.list.filter(i=>!i.checked).length;
  const checked = S.list.filter(i=>i.checked).length;

  hdr.innerHTML = `
    <header class="hdr">
      <div style="flex:1">
        <div class="hdr-title">Grocery List</div>
        ${S.list.length > 0 ? `<div class="hdr-sub">${remaining} item${remaining!==1?'s':''} remaining</div>` : ''}
      </div>
      <span id="sync-status" style="font-size:.72rem;font-weight:600;opacity:.85"></span>
      <button class="hdr-icon-btn" onclick="openSettings()" title="Sync settings" style="font-size:.95rem">&#9881;</button>
      ${S.list.length > 0 ? `<button class="hdr-btn" onclick="exportList()">Export</button>` : ''}
    </header>`;

  if (S.list.length === 0) {
    document.getElementById('main').innerHTML = `
      <div class="empty">
        <div class="empty-icon">${ICON.cart}</div>
        <div class="empty-title">Your list is empty</div>
        <div class="empty-sub">Go to the Meals tab to add ingredients from a saved meal, or tap the + button to add items manually.</div>
      </div>`;
    document.getElementById('fab-mount').innerHTML = `
      <button class="fab" onclick="openAddManual()" title="Add item" style="font-size:1.8rem;font-weight:300">+</button>`;
    return;
  }

  // Group by category
  const groups = {};
  for (const item of S.list) {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  }

  const orderedCats = CATS.map(c=>c.id).filter(id => groups[id]);
  const totalAll = totalList(S.list);
  const totalUnchecked = totalList(S.list.filter(i=>!i.checked));

  let html = '';

  // Summary bar
  if (totalAll > 0) {
    html += `<div class="summary-bar">
      <div class="total-col">
        <div class="total-label">Estimated Total</div>
        <div class="total-amount">$${totalUnchecked.toFixed(2)}</div>
        <div class="total-note">Whole Foods estimate · ${remaining} item${remaining!==1?'s':''}</div>
      </div>
      <div class="summary-actions">
        ${checked > 0 ? `<button class="btn btn-ghost btn-sm" onclick="clearChecked()">Clear ${checked} checked</button>` : ''}
      </div>
    </div>`;
  }

  // Action row
  if (S.list.length > 1) {
    html += `<div class="action-row">
      <button class="link-btn" onclick="checkAllItems()">Select all</button>
      ${checked > 0 ? `<button class="link-btn red" onclick="clearChecked()">Remove checked (${checked})</button>` : ''}
    </div>`;
  }

  // Category sections
  for (const catId of orderedCats) {
    const cat = catInfo(catId);
    const items = groups[catId];
    const catTotal = totalList(items);
    html += `<div class="section">
      <div class="section-hdr">
        <div class="cat-dot" style="background:${cat.color}"></div>
        <span class="section-title">${cat.label}</span>
        <span class="section-count">${items.length}</span>
        ${catTotal > 0 ? `<span class="section-total" style="margin-left:8px">$${catTotal.toFixed(2)}</span>` : ''}
      </div>`;
    for (const item of items) {
      const qtyDisplay = [item.qty, item.unit].filter(Boolean).join(' ');
      html += `<div class="list-item ${item.checked?'done':''}">
        <input type="checkbox" ${item.checked?'checked':''} onchange="toggleItem('${item.id}')">
        <div class="item-info">
          <div class="item-name">${esc(item.name)}</div>
          ${qtyDisplay ? `<div class="item-meta">${esc(qtyDisplay)}</div>` : ''}
          ${item.source ? `<span class="item-source">${esc(item.source)}</span>` : ''}
        </div>
        <div class="item-right">
          ${item.price > 0 ? `<span class="item-price">${fmtPrice(item.price)}</span>` : ''}
          <button class="item-del" onclick="removeItem('${item.id}')" title="Remove">✕</button>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  html += `<div style="height:16px"></div>`;
  document.getElementById('main').innerHTML = html;
  document.getElementById('fab-mount').innerHTML = `
    <button class="fab" onclick="openAddManual()" title="Add item" style="font-size:1.8rem;font-weight:300">+</button>`;
}

function renderMealsView() {

  let html = `
    <div class="search-wrap">

  if (filtered.length === 0) {
    html += `<div class="empty" style="padding:40px 32px">
      <div class="empty-title">${query ? 'No meals found' : 'No meals yet'}</div>
      <div class="empty-sub">${query ? 'Try a different search term.' : 'Tap "+ New Meal" to add your first recipe.'}</div>

  } else {

      const totalCost = meal.ingredients.reduce((a,i) => a+(i.price||0), 0);

        <div style="display:flex;align-items:flex-start;gap:8px">

          </div>
        </div>
        <div class="meal-pills">
          <span class="pill">Serves ${meal.servings||2}</span>
          <span class="pill">${meal.ingredients.length} ingredients</span>
          ${totalCost > 0 ? `<span class="pill">~$${totalCost.toFixed(2)}</span>` : ''}
        </div>
        <div class="meal-actions">
          <button class="btn btn-primary btn-sm" onclick="openPreCheck('${meal.id}')">+ Add to List</button>
          <button class="btn btn-ghost btn-sm" onclick="openDetail('${meal.id}')">View Recipe</button>
        </div>
      </div>`;
    }
  }

  html += `<div style="height:24px"></div>`;
  document.getElementById('main').innerHTML = html;
  document.getElementById('fab-mount').innerHTML = `
    <button class="fab" onclick="openForm(null)" title="New meal" style="font-size:1.8rem;font-weight:300">+</button>`;

  setTimeout(() => {
    const el = document.getElementById('meal-search');

  }, 0);

function renderPreCheck() {
  if (!S.preCheck.visible) { document.getElementById('modal-mount').innerHTML=''; return; }
  const meal = S.meals.find(m => m.id === S.preCheck.mealId);
  if (!meal) { closePreCheck(); return; }

  const checked = S.preCheck.checked;
  const selectedCount = checked.filter(Boolean).length;
  const selectedCost = meal.ingredients.reduce((a,i,idx) => a + (checked[idx] ? (i.price||0) : 0), 0);

  let rows = '';
  meal.ingredients.forEach((ing, idx) => {
    const c = checked[idx];
    const cat = catInfo(ing.category);
    rows += `<div class="check-item ${c?'':'unchecked'}">
      <input type="checkbox" ${c?'checked':''} onchange="togglePreCheck(${idx})">
      <div class="check-info">
        <div class="check-name">${esc(ing.name)}</div>
        <div class="check-qty">${esc(ing.qty)} ${esc(ing.unit)} &middot; ${cat.label}</div>
      </div>
      ${ing.price > 0 ? `<span class="check-price">${fmtPrice(ing.price)}</span>` : ''}
    </div>`;
  });

  document.getElementById('modal-mount').innerHTML = `
    <div class="modal-overlay" onclick="overlayClose(event)">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-hdr">
          <div>
            <div class="modal-title">${esc(meal.name)}</div>
            <div class="modal-sub">Uncheck items you already have</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="toggleAllPreCheck()">
            ${selectedCount===meal.ingredients.length?'Uncheck All':'Check All'}
          </button>
        </div>
        <div class="modal-body">${rows}</div>
        <div class="modal-footer">
          <button class="btn btn-ghost" style="flex:1" onclick="closePreCheck()">Cancel</button>
          <button class="btn btn-primary" style="flex:2" onclick="addToList()" ${selectedCount===0?'disabled style="opacity:.4"':''}>
            Add ${selectedCount} item${selectedCount!==1?'s':''}${selectedCost>0?' (~$'+selectedCost.toFixed(2)+')':''}
          </button>
        </div>
      </div>
    </div>`;
}

    ingrRows += `<div class="ingr-row" data-idx="${idx}">
      <input class="ingr-input" value="${esc(ing.name)}" placeholder="Name" oninput="formIngrChange(${idx},'name',this.value)">
      <input class="ingr-input" value="${esc(ing.qty)}" placeholder="Qty" oninput="formIngrChange(${idx},'qty',this.value)">
      <select class="ingr-input" onchange="formIngrChange(${idx},'unit',this.value)">
        ${UNITS.map(u=>`<option value="${u}" ${ing.unit===u?'selected':''}>${u}</option>`).join('')}
      </select>
      <select class="ingr-input" onchange="formIngrChange(${idx},'category',this.value)">
        ${CATS.map(c=>`<option value="${c.id}" ${ing.category===c.id?'selected':''}>${c.label}</option>`).join('')}
      </select>
      <input class="ingr-input" type="number" min="0" step="0.01" value="${ing.price||''}" placeholder="$" oninput="formIngrChange(${idx},'price',this.value)" style="text-align:right">
      <button class="ingr-del" onclick="removeIngrRow(${idx})" title="Remove">✕</button>
    </div>`;
  });

  document.getElementById('form-mount').innerHTML = `
    <div class="form-overlay" id="form-overlay">
      <div class="form-hdr">
        <button class="hdr-icon-btn" onclick="closeForm()" style="font-size:1.3rem;font-weight:300">‹</button>
        <span class="form-hdr-title">${isEdit?'Edit Meal':'New Meal'}</span>
        <button class="hdr-btn" onclick="saveMeal()">Save</button>
      </div>
      <div class="form-body">
        <div class="sec-label">Meal Details</div>
        <div class="field-group">
          <div class="field-row">
            <span class="field-label">Name</span>
            <input class="field-input" id="f-name" type="text" placeholder="e.g. Pasta Primavera" value="${esc(meal?.name||'')}">
          </div>
          <div class="field-row">
            <span class="field-label">Description</span>
            <input class="field-input" id="f-desc" type="text" placeholder="Short description..." value="${esc(meal?.description||'')}">
          </div>
          <div class="field-row">
            <span class="field-label">Serves</span>
            <input class="field-input" id="f-servings" type="number" min="1" max="20" value="${meal?.servings||2}">
          </div>
        </div>

        <div class="sec-label">Ingredients</div>
        <div class="ingr-wrap">
          <div class="ingr-grid-hdr">
            <span class="ingr-col-hdr">Name</span>
            <span class="ingr-col-hdr">Qty</span>
            <span class="ingr-col-hdr">Unit</span>
            <span class="ingr-col-hdr">Category</span>
            <span class="ingr-col-hdr">Price</span>
            <span></span>
          </div>
          <div id="ingr-rows">${ingrRows}</div>
          <div class="ingr-add-row">
            <button class="btn btn-secondary btn-sm" onclick="addIngrRow()">+ Add Ingredient</button>
          </div>
        </div>

        <div class="sec-label">Recipe / Instructions</div>
        <div class="field-group">
          <textarea class="field-textarea" id="f-recipe" placeholder="Write your recipe steps here..." rows="6">${esc(meal?.recipe||'')}</textarea>
        </div>

        <div style="display:flex;gap:10px;margin-top:4px">
          <button class="btn btn-primary" style="flex:1" onclick="saveMeal()">Save Meal</button>
          ${isEdit ? `<button class="btn btn-danger" onclick="deleteMealFromForm()">Delete</button>` : ''}
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════
// RENDER — MANUAL ADD MODAL
// ═══════════════════════════════════════════════

function renderManualAdd() {
  const catOptions = CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
  const unitOptions = UNITS.map(u=>`<option value="${u}">${u}</option>`).join('');
  document.getElementById('modal-mount').innerHTML = `
    <div class="modal-overlay" onclick="overlayClose(event)">
      <div class="modal-sheet" onclick="event.stopPropagation()" style="max-height:72vh">
        <div class="modal-handle"></div>
        <div class="modal-hdr">
          <div class="modal-title">Add Item</div>
        </div>
        <div class="modal-body" style="padding:16px">
          <div class="field-group" style="margin:0">
            <div class="field-row">
              <span class="field-label">Item</span>
              <input class="field-input" id="m-name" type="text" placeholder="e.g. Almond Milk">
            </div>
            <div class="field-row">
              <span class="field-label">Qty</span>
              <input class="field-input" id="m-qty" type="text" placeholder="1">
            </div>
            <div class="field-row">
              <span class="field-label">Unit</span>
              <select class="field-input" id="m-unit">${unitOptions}</select>
            </div>
            <div class="field-row">
              <span class="field-label">Category</span>
              <select class="field-input" id="m-cat">${catOptions}</select>
            </div>
            <div class="field-row">
              <span class="field-label">Est. Price</span>
              <input class="field-input" id="m-price" type="number" min="0" step="0.01" placeholder="0.00">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" style="flex:2" onclick="saveManualItem()">Add to List</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('m-name')?.focus(), 100);
}

// ═══════════════════════════════════════════════
// MASTER RENDER
// ═══════════════════════════════════════════════

function render() {
  renderNav();
  if (S.view === 'list') renderListView();
  else renderMealsView();
  if (S.preCheck.visible) renderPreCheck();
  else if (S.detail.visible) renderDetail();
  renderForm();
}

// ═══════════════════════════════════════════════
// VIEW ACTIONS
// ═══════════════════════════════════════════════

function setView(v) { S.view = v; render(); }
function onSearchInput(v) { S.mealSearch = v; renderMealsView(); }
function clearSearch() { S.mealSearch = ''; renderMealsView(); }

// ═══════════════════════════════════════════════
// LIST ACTIONS
// ═══════════════════════════════════════════════

function toggleItem(id) {
  const item = S.list.find(i=>i.id===id);
  if (item) { item.checked = !item.checked; save(); render(); }
}

function removeItem(id) {
  S.list = S.list.filter(i=>i.id!==id);
  save(); render();
}

function clearChecked() {
  S.list = S.list.filter(i=>!i.checked);
  save(); render();
  toast('Checked items removed');
}

function checkAllItems() {
  const allChecked = S.list.every(i=>i.checked);
  S.list.forEach(i => i.checked = !allChecked);
  save(); render();
}

function mergeOrAdd(newItem) {
  const existing = S.list.find(i =>
    !i.checked &&
    i.name.toLowerCase() === newItem.name.toLowerCase() &&
    i.unit === newItem.unit
  );
  if (existing) {
    const q1 = parseFloat(existing.qty), q2 = parseFloat(newItem.qty);
    if (!isNaN(q1) && !isNaN(q2)) {
      const sum = q1 + q2;
      existing.qty = Number.isInteger(sum) ? String(sum) : sum.toFixed(2).replace(/\.?0+$/,'');
    }
    existing.price = (existing.price||0) + (newItem.price||0);
    if (newItem.source && !existing.source.includes(newItem.source))
      existing.source += `, ${newItem.source}`;
  } else {
    S.list.push(newItem);
  }
}

// ═══════════════════════════════════════════════
// PRE-CHECK MODAL ACTIONS
// ═══════════════════════════════════════════════

function openPreCheck(mealId) {
  const meal = S.meals.find(m=>m.id===mealId);
  if (!meal) return;
  S.preCheck = { visible:true, mealId, checked: meal.ingredients.map(()=>true) };
  S.detail.visible = false;
  renderPreCheck();
}

function closePreCheck() {
  S.preCheck.visible = false;
  document.getElementById('modal-mount').innerHTML = '';
}

function togglePreCheck(idx) {
  S.preCheck.checked[idx] = !S.preCheck.checked[idx];
  renderPreCheck();
}

function toggleAllPreCheck() {
  const allOn = S.preCheck.checked.every(Boolean);
  S.preCheck.checked = S.preCheck.checked.map(()=>!allOn);
  renderPreCheck();
}

function addToList() {
  const meal = S.meals.find(m=>m.id===S.preCheck.mealId);
  if (!meal) return;
  let count = 0;
  meal.ingredients.forEach((ing, idx) => {
    if (!S.preCheck.checked[idx]) return;
    mergeOrAdd({ id:uid(), name:ing.name, qty:ing.qty, unit:ing.unit,
      category:ing.category||'other', price:ing.price||0, checked:false, source:meal.name });
    count++;
  });
  closePreCheck();
  S.view = 'list';
  save(); render();
  toast(`Added ${count} item${count!==1?'s':''} from ${meal.name}`);
}

// ═══════════════════════════════════════════════
// DETAIL MODAL ACTIONS
// ═══════════════════════════════════════════════

function openDetail(mealId) {
  S.detail = { visible:true, mealId };
  S.preCheck.visible = false;
  renderDetail();
}

function closeDetail() {
  S.detail.visible = false;
  document.getElementById('modal-mount').innerHTML = '';
}

function overlayClose(e) {
  if (e.target === e.currentTarget) {
    closePreCheck(); closeDetail();
    document.getElementById('modal-mount').innerHTML = '';
  }
}

function closeModal() {
  document.getElementById('modal-mount').innerHTML = '';
}

// ═══════════════════════════════════════════════
// MANUAL ADD
// ═══════════════════════════════════════════════

function openAddManual() { renderManualAdd(); }

function saveManualItem() {
  const name = document.getElementById('m-name')?.value.trim();
  if (!name) { toast('Please enter an item name', 'error'); return; }
  mergeOrAdd({
    id: uid(), name,
    qty:   document.getElementById('m-qty')?.value.trim() || '',
    unit:  document.getElementById('m-unit')?.value || 'item',
    category: document.getElementById('m-cat')?.value || 'other',
    price: parseFloat(document.getElementById('m-price')?.value) || 0,
    checked: false, source: ''
  });
  closeModal(); S.view = 'list'; save(); render();
  toast(`Added ${name}`);
}

// ═══════════════════════════════════════════════
// MEAL FORM ACTIONS
// ═══════════════════════════════════════════════

function openForm(mealId) {
  const meal = mealId ? S.meals.find(m=>m.id===mealId) : null;
  S.form = {
    visible: true, editId: mealId || null,
    ingredients: meal
      ? JSON.parse(JSON.stringify(meal.ingredients))
      : [{ name:'', qty:'1', unit:'item', category:'produce', price:0 }]
  };
  S.detail.visible = false;
  document.getElementById('modal-mount').innerHTML = '';
  renderForm();
  setTimeout(() => document.getElementById('f-name')?.focus(), 200);
}

function closeForm() {
  S.form.visible = false;
  document.getElementById('form-mount').innerHTML = '';
}

function formIngrChange(idx, field, val) {
  if (S.form.ingredients[idx])
    S.form.ingredients[idx][field] = field==='price' ? (parseFloat(val)||0) : val;
}

function addIngrRow() {
  S.form.ingredients.push({ name:'', qty:'1', unit:'item', category:'produce', price:0 });
  const container = document.getElementById('ingr-rows');
  if (!container) { renderForm(); return; }
  const idx = S.form.ingredients.length - 1;
  const div = document.createElement('div');
  div.className = 'ingr-row'; div.dataset.idx = idx;
  div.innerHTML = `
    <input class="ingr-input" value="" placeholder="Name" oninput="formIngrChange(${idx},'name',this.value)">
    <input class="ingr-input" value="1" placeholder="Qty" oninput="formIngrChange(${idx},'qty',this.value)">
    <select class="ingr-input" onchange="formIngrChange(${idx},'unit',this.value)">
      ${UNITS.map(u=>`<option value="${u}" ${u==='item'?'selected':''}>${u}</option>`).join('')}
    </select>
    <select class="ingr-input" onchange="formIngrChange(${idx},'category',this.value)">
      ${CATS.map(c=>`<option value="${c.id}" ${c.id==='produce'?'selected':''}>${c.label}</option>`).join('')}
    </select>
    <input class="ingr-input" type="number" min="0" step="0.01" value="" placeholder="$" oninput="formIngrChange(${idx},'price',this.value)" style="text-align:right">
    <button class="ingr-del" onclick="removeIngrRow(${idx})" title="Remove">✕</button>`;
  container.appendChild(div);
  div.querySelector('input').focus();
}

function removeIngrRow(idx) {
  if (S.form.ingredients.length <= 1) { toast('Need at least one ingredient'); return; }
  S.form.ingredients.splice(idx, 1);
  renderForm();
}

function saveMeal() {
  const name = document.getElementById('f-name')?.value.trim();
  if (!name) { toast('Please enter a meal name', 'error'); return; }
  const description = document.getElementById('f-desc')?.value.trim() || '';
  const servings    = parseInt(document.getElementById('f-servings')?.value) || 2;
  const recipe      = document.getElementById('f-recipe')?.value.trim() || '';
  const valid       = S.form.ingredients.filter(i => i.name.trim());
  if (valid.length === 0) { toast('Add at least one ingredient', 'error'); return; }

  if (S.form.editId) {
    const meal = S.meals.find(m=>m.id===S.form.editId);
    if (meal) Object.assign(meal, { name, description, servings, recipe, ingredients:valid });
  } else {
    S.meals.push({ id:uid(), name, description, servings, recipe, ingredients:valid });
  }
  closeForm(); save(); render();
  toast(S.form.editId ? 'Meal updated' : 'Meal saved');
}

function deleteMeal(mealId) {
  if (!confirm('Delete this meal?')) return;
  S.meals = S.meals.filter(m=>m.id!==mealId);
  save(); render(); toast('Meal deleted');
}

function deleteMealFromForm() {
  if (!S.form.editId) return;
  if (!confirm('Delete this meal permanently?')) return;
  S.meals = S.meals.filter(m=>m.id!==S.form.editId);
  closeForm(); save(); render(); toast('Meal deleted');
}

// ═══════════════════════════════════════════════
// EXPORT TO NOTES
// ═══════════════════════════════════════════════

function exportList() {
  const unchecked = S.list.filter(i=>!i.checked);
  if (unchecked.length === 0) { toast('Nothing to export', 'error'); return; }

  const date = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const total = totalList(unchecked);

  // Group by category
  const groups = {};
  for (const item of unchecked) {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  }

  let text = `Grocery List — ${date}\n`;
  text += '─'.repeat(34) + '\n\n';

  const orderedCats = CATS.map(c=>c.id).filter(id=>groups[id]);
  for (const catId of orderedCats) {
    const cat = catInfo(catId);
    text += `${cat.label.toUpperCase()}\n`;
    for (const item of groups[catId]) {
      const qty   = [item.qty, item.unit].filter(Boolean).join(' ');
      const price = item.price > 0 ? `  (~${fmtPrice(item.price)})` : '';
      text += `${item.name}${qty ? '  ' + qty : ''}${price}\n`;
    }
    text += '\n';
  }

  if (total > 0) {
    text += '─'.repeat(34) + '\n';
    text += `Estimated Total: ~$${total.toFixed(2)}\n`;
    text += `Whole Foods Market\n`;
  }

  // iOS: Web Share API opens native share sheet (can go straight to Notes)
  if (navigator.share) {
    navigator.share({ title: `Grocery List — ${date}`, text })
      .then(() => toast('List shared!'))
      .catch(err => { if (err.name !== 'AbortError') copyToClipboard(text); });
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(() => toast('Copied — paste into Notes'))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); toast('Copied — paste into Notes'); }
  catch(e) { toast('Could not copy', 'error'); }
  document.body.removeChild(ta);
}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (S.form.visible) { closeForm(); return; }
    if (S.preCheck.visible) { closePreCheck(); return; }
    if (S.detail.visible) { closeDetail(); return; }
    const m = document.getElementById('modal-mount');
    if (m && m.innerHTML) m.innerHTML = '';
  }
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════

ghLoadConfig();   // restore GitHub credentials from localStorage
load();           // restore data from localStorage (instant, no network)
render();         // paint the UI immediately

// Then try to pull fresher data from GitHub in the background
if (ghConfigured()) {
  ghSetStatus('loading');
  ghLoad().then(ok => { if (ok) render(); });
} else {
  ghSetStatus('unconfigured');
}
</script>
